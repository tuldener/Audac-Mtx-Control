<svg xmlns="http://www.w3.org/2000/svg" width="420" height="520" viewBox="0 0 420 520">
  <defs>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a3f2a"/>
      <stop offset="100%" stop-color="#3a3020"/>
    </linearGradient>
    <linearGradient id="zoneGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(200,170,60,0.25)"/>
      <stop offset="100%" stop-color="rgba(200,170,60,0.05)"/>
    </linearGradient>
    <linearGradient id="zoneFill40" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(200,170,60,0.3)"/>
      <stop offset="40%" stop-color="rgba(200,170,60,0.15)"/>
      <stop offset="40.1%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="zoneFill60" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(200,170,60,0.3)"/>
      <stop offset="60%" stop-color="rgba(200,170,60,0.15)"/>
      <stop offset="60.1%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="zoneFill25" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(200,170,60,0.3)"/>
      <stop offset="25%" stop-color="rgba(200,170,60,0.15)"/>
      <stop offset="25.1%" stop-color="transparent"/>
    </linearGradient>
    <clipPath id="cardClip">
      <rect x="16" y="16" width="388" height="488" rx="20"/>
    </clipPath>
  </defs>

  <!-- Card background -->
  <rect x="16" y="16" width="388" height="488" rx="20" fill="#1a1a1e" stroke="#2a2a30" stroke-width="1"/>

  <!-- Header -->
  <g>
    <!-- Music icon circle -->
    <circle cx="56" cy="52" r="22" fill="#8b7ec8" opacity="0.8"/>
    <text x="56" y="58" text-anchor="middle" fill="white" font-size="18" font-family="Arial">♪</text>
    <!-- Title -->
    <text x="88" y="46" fill="#e8e8e8" font-size="17" font-weight="bold" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">Audac MTX</text>
    <text x="88" y="64" fill="#888" font-size="12" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">5 Zonen</text>
    <!-- Zone counter -->
    <rect x="348" y="34" width="40" height="24" rx="12" fill="none" stroke="#c8aa3c" stroke-width="1.5" opacity="0.7"/>
    <text x="368" y="50" text-anchor="middle" fill="#c8aa3c" font-size="11" font-weight="600" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">5/5</text>
  </g>

  <!-- Zone 1: Bar (expanded with details) -->
  <g>
    <rect x="28" y="82" width="364" height="100" rx="16" fill="#252528"/>
    <rect x="28" y="82" width="364" height="100" rx="16" fill="url(#zoneFill60)"/>
    <!-- Speaker icon -->
    <circle cx="60" cy="110" r="18" fill="#c8aa3c"/>
    <text x="60" y="116" text-anchor="middle" fill="#1a1a1e" font-size="16" font-family="Arial">🔊</text>
    <!-- Zone name -->
    <text x="88" y="106" fill="#e8e8e8" font-size="15" font-weight="600" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">Bar</text>
    <text x="88" y="122" fill="#999" font-size="11" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">Line 3</text>
    <!-- Link icon -->
    <text x="128" y="106" fill="#999" font-size="9" opacity="0.6">🔗</text>
    <!-- Chevron -->
    <text x="374" y="112" text-anchor="middle" fill="#666" font-size="14" font-family="Arial">⌃</text>

    <!-- Expanded: Volume slider -->
    <rect x="44" y="140" width="300" height="4" rx="2" fill="#333"/>
    <rect x="44" y="140" width="180" height="4" rx="2" fill="#c8aa3c"/>
    <circle cx="224" cy="142" r="7" fill="#c8aa3c"/>
    <text x="354" y="146" text-anchor="end" fill="#999" font-size="11" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">60%</text>

    <!-- Source grid row -->
    <rect x="44" y="156" width="52" height="20" rx="6" fill="#c8aa3c" opacity="0.3"/>
    <text x="70" y="170" text-anchor="middle" fill="#c8aa3c" font-size="9" font-weight="500" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">Line 3</text>
    <rect x="102" y="156" width="52" height="20" rx="6" fill="#333"/>
    <text x="128" y="170" text-anchor="middle" fill="#999" font-size="9" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">Line 4</text>
    <rect x="160" y="156" width="52" height="20" rx="6" fill="#333"/>
    <text x="186" y="170" text-anchor="middle" fill="#999" font-size="9" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">Line 5</text>
    <rect x="218" y="156" width="52" height="20" rx="6" fill="#333"/>
    <text x="244" y="170" text-anchor="middle" fill="#999" font-size="9" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">Mic 1</text>
  </g>

  <!-- Zone 2: Raucher -->
  <g>
    <rect x="28" y="194" width="364" height="58" rx="16" fill="#252528"/>
    <rect x="28" y="194" width="364" height="58" rx="16" fill="url(#zoneFill40)"/>
    <circle cx="60" cy="223" r="18" fill="#c8aa3c"/>
    <text x="60" y="229" text-anchor="middle" fill="#1a1a1e" font-size="16" font-family="Arial">🔊</text>
    <text x="88" y="218" fill="#e8e8e8" font-size="15" font-weight="600" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">Raucher</text>
    <text x="88" y="234" fill="#999" font-size="11" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">Line 3</text>
    <text x="374" y="226" text-anchor="middle" fill="#666" font-size="14" font-family="Arial">⌵</text>
  </g>

  <!-- Zone 3: Garderobe -->
  <g>
    <rect x="28" y="264" width="364" height="58" rx="16" fill="#252528"/>
    <rect x="28" y="264" width="364" height="58" rx="16" fill="url(#zoneFill25)"/>
    <circle cx="60" cy="293" r="18" fill="#c8aa3c"/>
    <text x="60" y="299" text-anchor="middle" fill="#1a1a1e" font-size="16" font-family="Arial">🔊</text>
    <text x="88" y="288" fill="#e8e8e8" font-size="15" font-weight="600" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">Garderobe</text>
    <text x="88" y="304" fill="#999" font-size="11" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">Line 4</text>
    <text x="374" y="296" text-anchor="middle" fill="#666" font-size="14" font-family="Arial">⌵</text>
  </g>

  <!-- Zone 4: Sauna -->
  <g>
    <rect x="28" y="334" width="364" height="58" rx="16" fill="#252528"/>
    <rect x="28" y="334" width="364" height="58" rx="16" fill="url(#zoneFill40)"/>
    <circle cx="60" cy="363" r="18" fill="#c8aa3c"/>
    <text x="60" y="369" text-anchor="middle" fill="#1a1a1e" font-size="16" font-family="Arial">🔊</text>
    <text x="88" y="358" fill="#e8e8e8" font-size="15" font-weight="600" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">Sauna</text>
    <text x="88" y="374" fill="#999" font-size="11" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">Line 5</text>
    <text x="374" y="366" text-anchor="middle" fill="#666" font-size="14" font-family="Arial">⌵</text>
  </g>

  <!-- Zone 5: Darkroom -->
  <g>
    <rect x="28" y="404" width="364" height="58" rx="16" fill="#252528"/>
    <rect x="28" y="404" width="364" height="58" rx="16" fill="url(#zoneFill25)"/>
    <circle cx="60" cy="433" r="18" fill="#c8aa3c"/>
    <text x="60" y="439" text-anchor="middle" fill="#1a1a1e" font-size="16" font-family="Arial">🔊</text>
    <text x="88" y="428" fill="#e8e8e8" font-size="15" font-weight="600" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">Darkroom</text>
    <text x="88" y="444" fill="#999" font-size="11" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">Line 6</text>
    <text x="374" y="436" text-anchor="middle" fill="#666" font-size="14" font-family="Arial">⌵</text>
  </g>

  <!-- Subtle note about hidden slave zones -->
  <text x="210" y="486" text-anchor="middle" fill="#555" font-size="10" font-style="italic" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">Gekoppelte Slave-Zonen werden automatisch ausgeblendet</text>
</svg>
