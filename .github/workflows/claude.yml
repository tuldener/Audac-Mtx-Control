name: Claude

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
      issues: write
      checks: read
      actions: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          additional_permissions: |
            actions: read
          claude_args: |
            --max-turns 15
            --model claude-sonnet-4-5
            --allowedTools "Bash(git:*),Bash(gh pr:*),Bash(gh issue:*),Bash(gh release:*),Bash(python3:*),Bash(pip:*)"
            --system-prompt "You are working on ha-audac, a Home Assistant custom integration for AUDAC professional audio devices (MTX matrix, MFA amplifier, XMP44 SourceCon). Codebase is Python, uses DataUpdateCoordinator, config_flow with OptionsFlow, custom Lovelace cards in www/. Follow existing patterns. Always bump custom_components/audac_mtx/manifest.json version and add a CHANGELOG.md entry for user-visible changes. Never push to master directly — always open a PR."
